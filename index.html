<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
    <title>Restaurant Ordering App</title>
</head>
<body>
    
    <header class="hero">
        <img class="hero-img" src="./images/burger.png" alt="burger sitting on a table">
        <div class="hero-text">
            <h1>Jimmy's Diner</h1>
            <h2>The best burgers and pizzas in town.</h2>
        </div>
    </header>

    <main id="menu">

    </main>

    <footer id="order-details">
        <h3>Your order</h3>
        <section id="order-items"></section>
        <section id="order-total"></section>
        <button id="complete-order-btn">Complete order</button>
    </footer>

    <div id="modal-overlay" class="modal-overlay">
        <div class="checkout-modal">
            <h2>Enter card details</h2>
            <form id="payment-form">
                <input
                    name="customerName"
                    type="text" 
                    placeholder="Enter your name" 
                    required
                >
                <input
                    name="cardNumber"
                    type="text" 
                    placeholder="Enter card number" 
                    required
                >
                <input
                    name="cvv"
                    type="text" 
                    placeholder="Enter CVV" 
                    required
                >
                <button id="pay-btn" type="submit">Pay</button>
            </form>
        </div>
    </div>

    <div id="confirmation-msg"></div>

    <script type="module" src="index.js"></script>
</body>
</html>
